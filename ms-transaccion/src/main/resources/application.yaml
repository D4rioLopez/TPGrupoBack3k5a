spring:
  application:
    name: ms-venta

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/{nombre-de-tu-realm}

  datasource:
    url: jdbc:postgresql://localhost:5432/transaccion
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081