spring:
  application:
    name: ms-transaccion


  datasource:
    url: jdbc:postgresql://localhost:5432/transaccion
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/tpi-backend

portfolio:
  service:
    url: ${PORTFOLIO_SERVICE_URL:http://localhost:8082}

server:
  port: 8081