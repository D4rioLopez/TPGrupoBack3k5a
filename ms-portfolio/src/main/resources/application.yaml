spring:
  application:
    name: ms-portfolio

  datasource:
    url: jdbc:postgresql://localhost:5433/admin
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:                                                
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/tpi-backend

cotizacion:
  service:
    url: ${COTIZACION_SERVICE_URL:http://localhost:8083}

server:
  port: 8082